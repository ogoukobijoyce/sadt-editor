<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SADT Editor — Éditeur de diagrammes SADT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Barre d'outils ── -->
    <header id="toolbar">
      <div class="tb-section tb-brand">
        <span class="brand-title">SADT Editor</span>
      </div>

      <div class="tb-section tb-tools">
        <!-- Sélection -->
        <button id="btn-select" class="tool-btn active" title="Sélectionner (S)">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 3 L5 19 L9.5 15 L12 21 L14.5 20 L12 14 L17 14 Z"/></svg>
          Sélection
        </button>

        <!-- Rectangle -->
        <button id="btn-add-rect" class="tool-btn" title="Ajouter un rectangle (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="10" rx="2"/></svg>
          Rectangle
        </button>

        <!-- Sous-rectangle -->
        <button id="btn-add-sub-rect" class="tool-btn" title="Ajouter un sous-rectangle dans le rectangle sélectionné">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><rect x="6" y="9" width="12" height="7" rx="1.5"/></svg>
          Sous-rect
        </button>

        <!-- Flèche connexion -->
        <button id="btn-add-arrow" class="tool-btn" title="Flèche de connexion entre rectangles (A)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="12" x2="17" y2="12"/><polyline points="13,7 18,12 13,17"/></svg>
          Flèche
        </button>

        <!-- Flèche libre + sélecteur de type -->
        <div class="free-arrow-wrap">
          <button id="btn-add-free-arrow" class="tool-btn" title="Flèche libre (Entrée/Sortie/Contrôle/Mécanisme) (F)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="18" y2="6"/><polyline points="11,5 18,5 18,12"/></svg>
            Flèche libre
          </button>
          <select id="arrow-type-select" title="Type de flèche libre">
            <option value="input">🔵 Entrée</option>
            <option value="output">🟢 Sortie</option>
            <option value="control">🔴 Contrôle</option>
            <option value="mechanism">🟠 Mécanisme</option>
          </select>
        </div>
      </div>

      <div class="tb-section tb-actions">
        <button id="btn-delete" class="tool-btn danger" title="Supprimer l'élément sélectionné (Suppr)">
          🗑 Supprimer
        </button>

        <div class="tb-sep"></div>

        <button id="btn-save" class="tool-btn" title="Sauvegarder le diagramme en JSON (Ctrl+S)">
          💾 Sauvegarder
        </button>
        <button id="btn-load" class="tool-btn" title="Charger un diagramme JSON">
          📂 Charger
        </button>
        <input type="file" id="file-input" accept=".json" style="display:none" aria-label="Sélectionner un fichier JSON à charger">
        <button id="btn-export-png" class="tool-btn" title="Exporter en image PNG">
          🖼 PNG
        </button>
      </div>
    </header>

    <!-- ── Canvas ── -->
    <div id="canvas-container">
      <canvas id="canvas"></canvas>

      <!-- Éditeur de texte superposé -->
      <div id="label-editor">
        <input type="text" id="label-input" placeholder="Nom..." autocomplete="off" spellcheck="false">
      </div>

      <!-- Légende des couleurs -->
      <div id="legend">
        <div class="legend-item"><span class="dot input"></span>Entrée</div>
        <div class="legend-item"><span class="dot output"></span>Sortie</div>
        <div class="legend-item"><span class="dot control"></span>Contrôle</div>
        <div class="legend-item"><span class="dot mechanism"></span>Mécanisme</div>
      </div>
    </div>

    <!-- ── Barre de statut ── -->
    <footer id="status-bar">
      <span id="status-mode">Mode : Sélection</span>
      <span id="status-hint">Cliquez pour sélectionner · Glissez pour déplacer · Double-clic pour renommer · Suppr pour effacer · Glissez un rect dans un autre pour imbriquer</span>
      <span id="status-sel"></span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
